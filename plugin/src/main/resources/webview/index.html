<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  CSP equivalent to upstream panel-html.ts:10-66. A custom scheme has no CSP
  unless we serve one, and the webview renders data derived from untrusted
  session logs, so this is a security boundary, not a formality.

  script-src 'self' restricts scripts to this origin (https://aicoach-*) — no
  remote origins, no inline. Trusted Types were dropped (spike outcome): the
  bundled JCEF Chromium silently blocks innerHTML sinks under
  require-trusted-types-for 'script', preventing the dashboard from rendering
  even though app.js executes. The loading overlay appeared but never dismissed.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self';">
<link href="styles.css" rel="stylesheet">
<title>AI Coach</title>
<style>
  /* Anti-flash: paint in the IDE theme immediately. bootstrap.js sets these two
     variables from the live theme at request time; this is the static fallback. */
  html, body { margin: 0; height: 100%; background-color: var(--vscode-editor-background, #1e1e1e); color: var(--vscode-editor-foreground, #d4d4d4); }

  /* First-paint loading state. Shown the instant the webview paints — before
     app.js is even parsed and before the sidecar's first progress arrives —
     so the panel is never a blank rectangle during startup. app.js replaces
     #content (via the loading screen, then the dashboard), removing this. */
  #initial-loading {
    position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    color: var(--vscode-descriptionForeground, #8b949e);
    background-color: var(--vscode-editor-background, #1e1e1e);
  }
  #initial-loading .il-spinner {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid color-mix(in srgb, currentColor 22%, transparent);
    border-top-color: var(--vscode-progressBar-background, #3794ff);
    animation: il-spin 0.9s linear infinite;
  }
  #initial-loading .il-kicker {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.85;
  }
  @keyframes il-spin { to { transform: rotate(360deg); } }
</style>
<!-- Defines window.acquireVsCodeApi before app.js loads (the harness trick). -->
<script src="bootstrap.js"></script>
</head>
<body>
<div id="app">

      <li><a href="#" data-page="timeline"><span class="nav-icon">&#9472;</span> Timeline<span class="nav-badge" id="badge-sessions"></span></a></li>

    </ul>
    <div class="sidebar-filters">
      <div class="sidebar-filter">
        <label>Workspace</label>
        <div class="ws-toggle" id="ws-toggle">
          <button class="ws-toggle-btn active" data-ws="current">Current</button>
          <button class="ws-toggle-btn" data-ws="all">All</button>
        </div>
        <div class="combobox" id="ws-combobox">
          <input type="text" id="ws-filter-input" placeholder="Search workspaces..." autocomplete="off" />
          <div class="combobox-list" id="ws-filter-list"></div>
          <input type="hidden" id="ws-filter" />
        </div>
      </div>
      <div class="sidebar-filter">
        <label for="harness-filter">Harness</label>
        <select id="harness-filter"><option value="">All Harnesses</option></select>
      </div>
    </div>
  </nav>
  <main id="content">
    <div id="initial-loading">
      <div class="il-spinner"></div>
      <div class="il-kicker">Building Activity Index</div>
    </div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
