[versions]
# Build against IntelliJ IDEA 2024.2 (build 242); the plugin only depends on
# com.intellij.modules.platform so it installs in every JetBrains IDE.
intellijPlatform = "2.16.0"
intellijIdea = "2024.2.5"
kotlin = "2.1.20"
junit = "4.13.2"

[libraries]
# JUnit 4 for the platform-free unit tests (NodeDetector cascade, supervisor
# policy). The IntelliJ Platform test framework runs on JUnit 4 but doesn't
# export it onto the test compile classpath, so we declare it explicitly.
junit = { module = "junit:junit", version.ref = "junit" }

[plugins]
kotlin = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
intelliJPlatform = { id = "org.jetbrains.intellij.platform", version.ref = "intellijPlatform" }
