group = com.aicoach.jetbrains
version = 0.1.0

# The IDE ships a compatible Kotlin stdlib; don't bundle our own.
kotlin.stdlib.default.dependency = false

org.gradle.caching = true
org.gradle.parallel = true

# The IntelliJ Platform Gradle Plugin is not yet configuration-cache compatible
# for every task we use (verifyPlugin); keep it off until it is.
org.gradle.configuration-cache = false
